<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}询盘回复系统{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ═══════════════════════════════════════
       Design System: The Architect's Ledger
       Source: templates/DESIGN.md
    ═══════════════════════════════════════ */
    :root {
      /* Surface hierarchy */
      --surface:        #f8f9fd;
      --surface-panel:  #eceef1;
      --surface-card:   #ffffff;
      /* Text */
      --on-surface:     #191c1f;
      --on-surface-var: #43474e;
      /* Brand (navbar anchor — do not change) */
      --brand:          #1a3a5c;
      --brand-light:    #2a5080;
      /* Actions */
      --primary:        #002444;
      --secondary:      #0055c9;
      /* Badges */
      --badge-bg:       #dae2ff;
      --badge-text:     #00419e;
      /* Semantic */
      --error:           #ba1a1a;
      --urgent:          #4f3300;
      --status-pending:  #b35c00;
      --status-sent:     #1a6b3a;
      /* Elevation */
      --shadow-ambient: 0px 12px 32px rgba(25, 28, 31, 0.06);
    }
    body {
      background: var(--surface);
      font-family: 'Inter', sans-serif;
      font-size: .93rem;
      color: var(--on-surface);
    }

    /* ── Navbar ── */
    .navbar { background: var(--brand) !important; box-shadow: 0 2px 12px rgba(0,0,0,.18); }
    .navbar-brand {
      color: #fff !important;
      font-family: 'Manrope', sans-serif;
      font-weight: 700;
      letter-spacing: .02em;
    }
    /* 导航角标 */
    .nav-badge {
      position: absolute; top: -4px; right: -6px;
      font-size: .6rem; padding: 2px 5px; border-radius: 8px;
      line-height: 1; pointer-events: none;
    }

    /* ── Cards — no border, tonal layering ── */
    .card {
      border: none;
      background: var(--surface-card);
      box-shadow: var(--shadow-ambient);
      border-radius: 0.75rem;
    }
    .card-header {
      background: transparent;
      border-bottom: none;
      padding: 1rem 1.25rem 0.5rem;
    }

    /* ── Stat cards ── */
    .stat-card { border-radius: 0.75rem; transition: transform .15s; }
    .stat-card:hover { transform: translateY(-2px); }
    .stat-num {
      font-family: 'Manrope', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      line-height: 1;
      color: var(--on-surface);
    }

    /* ── Badges — unified tonal style ── */
    .badge { border-radius: 0.375rem; font-weight: 600; }
    .badge-inquiry,
    .badge-spam,
    .badge-other {
      background: var(--badge-bg) !important;
      color: var(--badge-text) !important;
    }

    /* ── Status text ── */
    .s-pending { color: var(--status-pending); font-weight: 600; }
    .s-sent    { color: var(--status-sent); font-weight: 600; }
    .s-rejected{ color: var(--on-surface-var); }
    .s-ignored { color: var(--on-surface-var); }
    .s-new     { color: var(--secondary); }

    /* ── Table — ghost borders, tonal header ── */
    .table { font-size: .88rem; color: var(--on-surface); }
    .table > :not(caption) > * > * { padding: .65rem 1rem; }
    .table thead tr { background: var(--surface-panel); }
    .table thead th {
      font-family: 'Inter', sans-serif;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--on-surface-var);
      font-weight: 600;
      border: none;
    }
    .table tbody tr { border-bottom: 1px solid rgba(195, 198, 207, 0.15); }
    .table tbody tr:hover { background: var(--surface-card); cursor: pointer; }
    .row-expanded { background: #f0f4ff !important; }

    /* ── Preview pane ── */
    .email-preview {
      background: var(--surface-panel);
      border-left: 3px solid var(--secondary);
      border-radius: 0 0.375rem 0.375rem 0;
      padding: .8rem 1rem;
      font-size: .83rem;
      color: var(--on-surface-var);
      white-space: pre-wrap;
      max-height: 300px;
      overflow-y: auto;
    }

    /* ── Draft page ── */
    .draft-body-area {
      font-size: .87rem;
      line-height: 1.65;
      font-family: 'Inter', sans-serif;
      resize: vertical;
      background: var(--surface-panel);
      border: none;
      border-bottom: 2px solid transparent;
      border-radius: 0.375rem 0.375rem 0 0;
      transition: border-color .15s;
    }
    .draft-body-area:focus {
      outline: none;
      border-bottom-color: var(--secondary);
      box-shadow: none;
    }
    .original-mail {
      white-space: pre-wrap;
      font-size: .83rem;
      color: var(--on-surface-var);
      max-height: 360px;
      overflow-y: auto;
      background: var(--surface-panel);
      border-radius: 0.5rem;
      padding: .9rem 1rem;
      border: none;
    }

    /* ── Match score pill ── */
    .score-high { background: #d1f0e0; color: #0f5132; }
    .score-mid  { background: #fff3cd; color: #664d03; }
    .score-low  { background: #fde8e8; color: var(--error); }

    /* ── Toast ── */
    .toast-container { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 9999; }

    /* ── Copy btn ── */
    .btn-copy { transition: all .2s; }
    .btn-copy.copied { background: var(--status-sent); color: #fff; border-color: var(--status-sent); }

    /* ══════════════════════════════════════════
       Button overrides (Bootstrap reset)
    ══════════════════════════════════════════ */
    .btn-primary {
      background: linear-gradient(135deg, var(--brand), var(--primary));
      border-color: var(--primary);
      border-radius: 0.375rem;
      font-weight: 600;
      transition: background 200ms ease-in-out, border-color 200ms ease-in-out;
    }
    .btn-primary:hover,
    .btn-primary:focus,
    .btn-primary:active {
      background: var(--secondary) !important;
      border-color: var(--secondary) !important;
    }
    .btn-danger,
    .btn-outline-danger:hover {
      background: var(--error);
      border-color: var(--error);
      border-radius: 0.375rem;
      font-weight: 600;
    }
    .btn-outline-danger {
      color: var(--error);
      border-color: var(--error);
      border-radius: 0.375rem;
    }
    .btn-success { border-radius: 0.375rem; font-weight: 600; }
    .btn-outline-secondary { border-radius: 0.375rem; }
    .btn-outline-warning   { border-radius: 0.375rem; }
    .btn-outline-info      { border-radius: 0.375rem; }
    .btn-outline-light     { border-radius: 0.375rem; }

    /* ══════════════════════════════════════════
       Form control overrides (bottom-border focus)
    ══════════════════════════════════════════ */
    .form-control,
    .form-select {
      background: var(--surface-panel);
      border: none;
      border-bottom: 2px solid transparent;
      border-radius: 0.375rem 0.375rem 0 0;
      color: var(--on-surface);
      transition: border-color .15s;
    }
    .form-control:focus,
    .form-select:focus {
      background: var(--surface-panel);
      border-bottom-color: var(--secondary);
      box-shadow: none;
      color: var(--on-surface);
    }
    .form-control::placeholder { color: var(--on-surface-var); opacity: .7; }
    /* input-group icon wrapper */
    .input-group-text {
      background: var(--surface-panel);
      border: none;
      border-bottom: 2px solid transparent;
      border-radius: 0.375rem 0 0 0;
    }
  </style>
</head>
<body>

<nav class="navbar navbar-dark mb-4">
  <div class="container-lg">
    <a class="navbar-brand" href="/">
      <i class="bi bi-envelope-check-fill me-2"></i>询盘回复系统
    </a>
    <div class="d-flex gap-1 align-items-center flex-wrap">
      <!-- 主导航 -->
      <a href="/" class="btn btn-sm btn-outline-light position-relative
        {% if request.url.path == '/' %}active{% endif %}" title="询盘">
        <i class="bi bi-inbox"></i><span class="d-none d-lg-inline ms-1">询盘</span>
        <span id="badge-drafts" class="nav-badge bg-warning text-dark d-none"></span>
      </a>
      <a href="/followups" class="btn btn-sm btn-outline-light position-relative
        {% if request.url.path == '/followups' %}active{% endif %}" title="跟进">
        <i class="bi bi-bell"></i><span class="d-none d-lg-inline ms-1">跟进</span>
        <span id="badge-followups" class="nav-badge bg-danger text-white d-none"></span>
      </a>
      <a href="/customers" class="btn btn-sm btn-outline-light
        {% if request.url.path.startswith('/customer') %}active{% endif %}" title="客户">
        <i class="bi bi-people"></i><span class="d-none d-lg-inline ms-1">客户</span>
      </a>
      <a href="/analytics" class="btn btn-sm btn-outline-light
        {% if request.url.path == '/analytics' %}active{% endif %}" title="数据分析">
        <i class="bi bi-bar-chart-line"></i><span class="d-none d-lg-inline ms-1">分析</span>
      </a>
      <a href="/settings" class="btn btn-sm btn-outline-light
        {% if request.url.path.startswith('/settings') %}active{% endif %}" title="设置">
        <i class="bi bi-gear"></i><span class="d-none d-lg-inline ms-1">设置</span>
      </a>

      <!-- 分隔 -->
      <span class="text-white-50 mx-1 d-none d-md-inline">|</span>

      <!-- 检查邮件 -->
      <span id="poll-status" class="text-white-50 small d-none">
        <i class="bi bi-arrow-repeat spin me-1"></i><span class="d-none d-md-inline">检查中…</span>
      </span>
      <form method="post" action="/poll" id="poll-form">
        <button class="btn btn-sm btn-light text-dark fw-semibold" type="submit" title="立即检查邮件">
          <i class="bi bi-arrow-repeat"></i><span class="d-none d-md-inline ms-1">检查邮件</span>
        </button>
      </form>

      <!-- 用户菜单（帮助并入） -->
      <div class="dropdown">
        <button class="btn btn-sm btn-outline-light dropdown-toggle" data-bs-toggle="dropdown">
          <i class="bi bi-person-circle"></i>
        </button>
        <ul class="dropdown-menu dropdown-menu-end">
          <li><a class="dropdown-item small" href="/help">
            <i class="bi bi-question-circle me-2"></i>帮助文档
          </a></li>
          <li><a class="dropdown-item small" href="/settings/password">
            <i class="bi bi-lock me-2"></i>修改密码
          </a></li>
          <li><hr class="dropdown-divider"></li>
          <li><a class="dropdown-item small text-danger" href="/logout">
            <i class="bi bi-box-arrow-right me-2"></i>退出登录
          </a></li>
        </ul>
      </div>
    </div>
  </div>
</nav>

<div class="container-lg pb-5">
  {% block content %}{% endblock %}
</div>

<!-- 通用确认 Modal -->
<div class="modal fade" id="confirmModal" tabindex="-1">
  <div class="modal-dialog modal-sm">
    <div class="modal-content">
      <div class="modal-body py-3 px-4 text-center">
        <p class="mb-0 fw-semibold" id="confirm-msg" style="white-space:pre-line"></p>
      </div>
      <div class="modal-footer justify-content-center py-2 gap-2">
        <button type="button" class="btn btn-sm btn-secondary" data-bs-dismiss="modal">取消</button>
        <button type="button" class="btn btn-sm btn-primary" id="confirm-ok">确认</button>
      </div>
    </div>
  </div>
</div>

<!-- Toast container -->
<div class="toast-container">
  <div id="toast-msg" class="toast align-items-center text-bg-success border-0" role="alert">
    <div class="d-flex">
      <div class="toast-body" id="toast-text"></div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<style>
@keyframes spin { to { transform: rotate(360deg); } }
.spin { display: inline-block; animation: spin 1s linear infinite; }
</style>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
// 检查邮件时显示 loading 状态
document.getElementById('poll-form')?.addEventListener('submit', () => {
  document.getElementById('poll-status').classList.remove('d-none');
});

// 导航角标：拉取待审草稿数 + 逾期跟进数
function refreshBadges() {
  fetch('/api/counts').then(r => r.json()).then(d => {
    const bd = document.getElementById('badge-drafts');
    const bf = document.getElementById('badge-followups');
    if (bd) {
      if (d.pending_drafts > 0) { bd.textContent = d.pending_drafts; bd.classList.remove('d-none'); }
      else bd.classList.add('d-none');
    }
    if (bf) {
      if (d.overdue_followups > 0) { bf.textContent = d.overdue_followups; bf.classList.remove('d-none'); }
      else bf.classList.add('d-none');
    }
  }).catch(() => {});
}
refreshBadges();
setInterval(refreshBadges, 60000); // 每分钟刷新一次角标

// 通用确认弹窗（替代 window.confirm）
function confirmAction(msg, onOk) {
  document.getElementById('confirm-msg').textContent = msg;
  const modal = new bootstrap.Modal(document.getElementById('confirmModal'));
  const okBtn = document.getElementById('confirm-ok');
  const handler = () => { modal.hide(); okBtn.removeEventListener('click', handler); onOk(); };
  okBtn.addEventListener('click', handler);
  modal.show();
}

// 通用 toast 显示
function showToast(msg, type = 'success') {
  const el = document.getElementById('toast-msg');
  el.className = `toast align-items-center text-bg-${type} border-0`;
  document.getElementById('toast-text').textContent = msg;
  new bootstrap.Toast(el, { delay: 3000 }).show();
}

// 查询参数提示
const p = new URLSearchParams(location.search);
if (p.get('saved'))        showToast('已保存');
if (p.get('sent'))         showToast('邮件正在后台发送，稍后刷新查看状态');
if (p.get('sending'))      showToast('邮件正在发送中，稍后刷新页面确认结果', 'info');
if (p.get('polling'))      showToast('正在后台检查邮件，稍后刷新页面');
if (p.get('deleted'))      showToast('已删除', 'warning');
if (p.get('reprocessed'))  showToast('已提交重新处理，稍后刷新页面查看结果', 'info');
if (p.get('regenerated'))  showToast('草稿正在后台重新生成，稍后刷新页面', 'info');

// 复制按钮
document.querySelectorAll('.btn-copy').forEach(btn => {
  btn.addEventListener('click', () => {
    const target = document.querySelector(btn.dataset.target);
    if (!target) return;
    navigator.clipboard.writeText(target.value || target.textContent).then(() => {
      btn.classList.add('copied');
      btn.innerHTML = '<i class="bi bi-check2 me-1"></i>已复制';
      setTimeout(() => {
        btn.classList.remove('copied');
        btn.innerHTML = '<i class="bi bi-clipboard me-1"></i>复制';
      }, 2000);
    });
  });
});
</script>
{% block scripts %}{% endblock %}
</body>
</html>
