{% extends "base.html" %}
{% block title %}账号信息 — 询盘回复系统{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <h6 class="fw-semibold mb-4"><i class="bi bi-person-circle me-2"></i>账号信息</h6>
    <div class="card">
      <div class="card-body">
        <div class="alert alert-info py-2 small mb-3">
          <i class="bi bi-info-circle me-1"></i>
          本系统直接使用您的邮箱账号登录，无单独密码。如需修改邮箱密码，请前往对应邮件服务商的官网操作。
        </div>
        {% if user %}
        <div class="mb-2">
          <span class="text-muted small">当前登录邮箱</span>
          <div class="fw-semibold mt-1">{{ user.email }}</div>
        </div>
        {% endif %}
        <div class="mt-3">
          <a href="/logout" class="btn btn-outline-danger btn-sm">
            <i class="bi bi-box-arrow-right me-1"></i>退出登录
          </a>
        </div>
      </div>
    </div>
    <div class="text-center mt-3">
      <a href="/settings" class="small text-muted">← 返回设置</a>
    </div>
  </div>
</div>
{% endblock %}
